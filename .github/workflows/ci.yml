name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check frontend and Rust
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ci

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare ADB sidecar
        run: npm run prepare:adb

      - name: Verify project versions
        run: >-
          node -e "const fs=require('node:fs');
          const packageVersion=require('./package.json').version;
          const tauriVersion=require('./src-tauri/tauri.conf.json').version;
          const cargo=fs.readFileSync('src-tauri/Cargo.toml','utf8');
          const cargoVersion=cargo.match(/^version = \"([^\"]+)\"/m)?.[1];
          if (!cargoVersion || packageVersion !== tauriVersion || packageVersion !== cargoVersion)
          throw new Error('Version mismatch: package='+packageVersion+', tauri='+tauriVersion+', cargo='+cargoVersion);"

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features --locked
