name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify versions and tag
        run: >-
          node -e "const fs=require('node:fs');
          const packageVersion=require('./package.json').version;
          const tauriVersion=require('./src-tauri/tauri.conf.json').version;
          const cargo=fs.readFileSync('src-tauri/Cargo.toml','utf8');
          const cargoVersion=cargo.match(/^version = \"([^\"]+)\"/m)?.[1];
          if (!cargoVersion || packageVersion !== tauriVersion || packageVersion !== cargoVersion)
          throw new Error('Version mismatch: package='+packageVersion+', tauri='+tauriVersion+', cargo='+cargoVersion);
          if (process.env.GITHUB_REF_TYPE === 'tag' && process.env.GITHUB_REF_NAME !== 'v'+packageVersion)
          throw new Error('Release tag must be v'+packageVersion+', got '+process.env.GITHUB_REF_NAME);"

  publish:
    name: Build ${{ matrix.label }}
    needs: validate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - label: Windows x86_64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - label: macOS Apple Silicon
            platform: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: release-${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: v__VERSION__
          releaseName: PenManager v__VERSION__
          releaseBody: See the assets below to download and install PenManager.
          releaseDraft: true
          prerelease: false
